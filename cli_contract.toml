[app]
name = "tm"
repo = "ryangerardwilson/tm"
install_strategy = "python-source"
release_asset = "tm-linux-x64.tar.gz"
install_test_path = "tests/test_install_contract.py"

[launcher]
exposure = "local-bin"

[tmux]
enabled = true
default_key = "M-i"
snippet_name = "tm.conf"
run_shell_command = "TMUX_CLIENT_TTY='#{client_tty}' \"${PUBLIC_LAUNCHER}\" >/dev/null 2>&1"
unbind_keys = []
legacy_lines = [
  "source-file ~/.tmux/tm.conf",
]
extra_bindings = []
